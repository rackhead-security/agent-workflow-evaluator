name: Assemble approved specification

on:
  push:
    branches:
      - agent/v0.1-spec
    paths:
      - .spec-chunks/READY

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.1-spec
      - name: Assemble and verify canonical specification
        shell: bash
        run: |
          set -euo pipefail
          cat .spec-chunks/part-* | base64 --decode > docs/v0.1-spec.md
          echo "598b3a9981b89bd37759a22ec4781a58e843b45aba32778dec531eba62b04b68  docs/v0.1-spec.md" | sha256sum --check --strict
          grep -Fq '**Status:** APPROVED DECISION' docs/v0.1-spec.md
          grep -Fq '`approvals` is the sole source of truth' docs/v0.1-spec.md
          grep -Fq 'Validation has three stages and is fail-closed.' docs/v0.1-spec.md
          grep -Fq '## 22. Follow-up work after v0.1' docs/v0.1-spec.md
      - name: Commit assembled specification
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/v0.1-spec.md
          git diff --cached --quiet && exit 0
          git commit -m "docs: resolve v0.1 review blockers"
          git push origin HEAD:agent/v0.1-spec
